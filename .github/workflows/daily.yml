name: Daily disruption scan

on:
  schedule:
    - cron: "0 6 * * *"        # 06:00 UTC every day (yesterday is a fully-settled GDELT day)
  workflow_dispatch:            # lets you run it by hand from the Actions tab
    inputs:
      run_date:
        description: "Event day YYYY-MM-DD (leave blank = yesterday, UTC)"
        required: false
        default: ""

# The bot commits the refreshed data back to the repo, so it needs write access.
permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          RUN_DATE: ${{ github.event.inputs.run_date }}
          MAX_GB: "30"            # hard byte cap -> can never leave the BigQuery free tier
          # ENRICH_TITLES: "1"    # uncomment to scrape real headlines (slower, best-effort)
        run: python fetch.py

      - name: Commit refreshed data
        run: |
          git config user.name  "disruption-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/history.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: disruption scan $(date -u +%F)"
            git push
          fi
